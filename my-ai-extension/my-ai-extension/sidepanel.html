<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>A-Eye Commander</title>
  <style>
    /* Dark mode by default for reduced eye strain/high contrast */
    body { font-family: -apple-system, sans-serif; padding: 15px; background: #222; color: #fff; display: flex; flex-direction: column; height: 95vh; margin: 0; }
    h2 { text-align: center; margin: 0 0 15px 0; color: #4dabf7; }
    
    #chat-container { flex: 1; overflow-y: auto; background: #333; border: 1px solid #555; border-radius: 8px; padding: 15px; margin-bottom: 10px; display: flex; flex-direction: column; gap: 10px; }
    
    .message { padding: 10px; border-radius: 8px; max-width: 90%; font-size: 16px; line-height: 1.5; }
    .system { align-self: center; color: #aaa; font-style: italic; font-size: 14px; background: #444; }
    .user { align-self: flex-end; background: #0d6efd; color: white; }
    .ai { align-self: flex-start; background: #444; color: #eee; border-left: 4px solid #4dabf7; }
    
    /* Huge Voice Button */
    #btn-mic { width: 100%; padding: 25px; font-size: 22px; font-weight: bold; border-radius: 10px; border: none; cursor: pointer; background: #d63384; color: white; margin-bottom: 10px; transition: 0.2s; }
    #btn-mic:hover { background: #c2185b; }
    
    /* Input Area (Hidden mostly, for manual override) */
    .input-area { display: flex; gap: 8px; }
    input { flex: 1; padding: 10px; border-radius: 5px; border: none; background: #444; color: white; }
    #btn-send { background: #198754; color: white; padding: 0 20px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }

    img { max-width: 100%; border-radius: 5px; margin-top: 5px; border: 1px solid #555; }
  </style>
</head>
<body>

  <h2>👁️ A-Eye Commander</h2>

  <div id="chat-container">
    <div class="message system">System Ready. Click the Pink Button and say a command.</div>
  </div>

  <button id="btn-mic">🎤 Speak Command</button>

  <div class="input-area">
    <input type="text" id="user-input" placeholder="Manual command..." />
    <button id="btn-send">Send</button>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
